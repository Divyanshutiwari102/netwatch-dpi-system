spring.application.name=dpi-engine
server.port=${PORT:8080}

# ??? Capture ??????????????????????????????????????????????????????
dpi.capture.interface=any
dpi.capture.snaplen=65535
dpi.capture.timeout-ms=10
dpi.capture.ring-buffer-size=20000
dpi.capture.worker-threads=4
dpi.capture.queue-size=5000

# ??? Flow tracking ????????????????????????????????????????????????
dpi.flow.timeout-seconds=120

# ??? WebSocket batching ???????????????????????????????????????????
dpi.ws.batch-interval-ms=300
dpi.ws.sample-rate=1
dpi.ws.max-batch-size=50

# ??? WebSocket CORS ???????????????????????????????????????????????
dpi.websocket.allowed-origins=https://netwatch-dpi-system.vercel.app,https://netwatch-backend-9qxu.onrender.com

# ??? OpenAPI ??????????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ??? Actuator ?????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ??? Server ???????????????????????????????????????????????????????
server.tomcat.connection-timeout=60s

# ??? Logging ??????????????????????????????????????????????????????
logging.level.com.dpi=INFO
logging.level.org.pcap4j=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n