spring.application.name=dpi-engine
server.port=${PORT:8080}

# ??? Capture ? disabled on cloud (no raw socket access) ???????????????????????
dpi.capture.interface=none
dpi.capture.snaplen=65535
dpi.capture.timeout-ms=10
dpi.capture.ring-buffer-size=10000
dpi.capture.worker-threads=2
dpi.capture.queue-size=1000

# ??? Flow tracking ????????????????????????????????????????????????????????????
dpi.flow.timeout-seconds=120

# ??? WebSocket batching ???????????????????????????????????????????????????????
dpi.ws.batch-interval-ms=300
dpi.ws.sample-rate=1
dpi.ws.max-batch-size=50

# ??? WebSocket CORS ? Vercel URL (update after frontend deploy) ???????????????
dpi.websocket.allowed-origins=https://netwatch-dpi-system.vercel.app

# ??? OpenAPI ??????????????????????????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ??? Actuator ?????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ??? Logging ??????????????????????????????????????????????????????????????????
logging.level.com.dpi=INFO
logging.level.org.pcap4j=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n