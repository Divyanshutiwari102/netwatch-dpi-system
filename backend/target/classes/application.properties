spring.application.name=dpi-engine
server.port=8080

# ─── Capture ──────────────────────────────────────────────────────────────────
# "auto" → scores all adapters and picks best non-virtual one.
#   Rejects: Bluetooth, Hyper-V, VMware, VirtualBox, ISATAP, Teredo, VPN tap.
#   Prefers: Wi-Fi, Ethernet/WLAN adapters with an assigned IP address.
# Explicit name → overrides scoring completely.
#   Linux/macOS example:  dpi.capture.interface=eth0
#   Windows example:      dpi.capture.interface=\Device\NPF_{GUID}
#   List available names: GET /api/capture/interfaces
dpi.capture.interface=auto
dpi.capture.snaplen=65535
dpi.capture.timeout-ms=10
dpi.capture.ring-buffer-size=50000
dpi.capture.worker-threads=4
dpi.capture.queue-size=5000

# ─── Flow tracking ────────────────────────────────────────────────────────────
dpi.flow.timeout-seconds=120

# ─── WebSocket batching ───────────────────────────────────────────────────────
# How often the broadcaster flushes its staging queue (milliseconds).
# 300 ms = max 3 STOMP frames/second instead of 50,000 per-packet messages.
dpi.ws.batch-interval-ms=300

# Forward 1 in N packets to the WebSocket.
# Blocked packets always bypass this gate (always visible in UI).
# Raise for >50k pps networks; lower to 1 for low-traffic demo environments.
dpi.ws.sample-rate=5

# Maximum packets per STOMP frame (50 * ~200 bytes ~= 10 KB per frame).
dpi.ws.max-batch-size=50

# ─── WebSocket CORS ───────────────────────────────────────────────────────────
dpi.websocket.allowed-origins=http://localhost:8080,http://localhost:3000

# ─── OpenAPI ──────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.dpi=INFO
logging.level.org.pcap4j=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n
